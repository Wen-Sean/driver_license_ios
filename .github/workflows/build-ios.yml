name: Build iOS App (Cloud Mac)

on:
    push:
        branches: [main, master]
    workflow_dispatch: # 支援在 GitHub 網頁上手動點擊觸發打包

jobs:
    build:
        name: Build iOS Project on Cloud macOS
        runs-on: macos-14 # 使用 GitHub 免費提供的 Apple Silicon Mac 虛擬主機

        steps:
            - name: 1. 檢出程式碼 (Checkout Repo)
              uses: actions/checkout@v4

            - name: 2. 設定 Node.js 環境
              uses: actions/setup-node@v4
              with:
                  node-version: 18

            - name: 3. 安裝專案套件 (npm install)
              run: npm install

            - name: 4. 打包前端 Web 資源 (npm run build)
              run: npm run build

            - name: 5. 同步至 iOS 原生專案 (Capacitor Sync)
              run: npx cap sync ios

            - name: 6. 雲端 Mac Xcode 編譯 iOS 專案
              run: |
                  xcodebuild -workspace ios/App/App.xcworkspace \
                             -scheme App \
                             -sdk iphoneos \
                             -configuration Release \
                             -derivedDataPath build \
                             CODE_SIGNING_ALLOWED=NO \
                             CODE_SIGN_IDENTITY="" \
                             CODE_SIGNING_REQUIRED=NO

            - name: 7. 壓縮打包產物
              run: |
                  cd build/Build/Products/Release-iphoneos
                  zip -r ../../../App-iOS-Build.zip App.app

            - name: 8. 上傳編譯檔案至 GitHub (Upload Artifact)
              uses: actions/upload-artifact@v4
              with:
                  name: iOS-App-Build
                  path: App-iOS-Build.zip
