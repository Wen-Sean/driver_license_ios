name: Build iOS App (Cloud Mac)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 支援在 GitHub 網頁上手動點擊觸發打包

jobs:
  build:
    name: Build iOS Project on Cloud macOS
    runs-on: macos-14 # 使用 GitHub 免費提供的 Apple Silicon Mac 虛擬主機

    steps:
      - name: 1. 檢出程式碼 (Checkout Repo)
        uses: actions/checkout@v4

      - name: 2. 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. 安裝專案套件與修正執行權限
        run: |
          npm install
          chmod -R +x node_modules/.bin/ || true

      - name: 4. 打包前端 Web 資源 (npm run build)
        run: |
          chmod -R +x node_modules/.bin/ || true
          npm run build

      - name: 5. 同步至 iOS 原生專案 (Capacitor Sync)
        run: |
          chmod -R +x node_modules/.bin/ || true
          npx cap sync ios

      - name: 6. 雲端 Mac Xcode 編譯 iOS 專案
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO

      - name: 7. 打包產物封裝為 IPA 格式
        run: |
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/App.app build/Payload/
          cd build
          zip -r 2026-DriverLicense-iOS.ipa Payload

      - name: 8. 上傳 IPA 檔至 GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 2026-DriverLicense-iOS-IPA
          path: build/2026-DriverLicense-iOS.ipa
